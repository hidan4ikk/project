name: tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install numpy scikit-learn

      - name: Run tests
        run: python tests.py

      # Быстрая проверка, что весь пайплайн проходит от начала до конца
      # (уменьшенные размеры, фиксированные seed'ы — укладывается в ~минуту).
      - name: Pipeline smoke
        run: |
          python solver.py --n 300 --budget 5000
          python ml.py
          python benchmark.py --n-random 40 --n-provable 10 --budget 3000
